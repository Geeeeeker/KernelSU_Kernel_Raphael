name: Kernel CI

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  Patch_KernelSU:
    runs-on: ubuntu-latest
    env:
      KernelSU_Dir: /home/runner/work/KernelSU
      Setup_Dir: /home/runner/work/Setup_Dir
    steps:
      - name: Download KernelSU from 'SoDebug/KernelSU'
        run: |
          mkdir -p "$KernelSU_Dir"
          git clone https://github.com/SoDebug/KernelSU.git "$KernelSU_Dir"

      - name: Get KernelSU version and id
        run: |
          cd "$KernelSU_Dir"
          echo "kernelsu_id=$(git show -s --format='%h')" >> $GITHUB_ENV
          git_count=$(git rev-list --count HEAD)
          kernelsu_version=$(expr 10000 + $git_count + 200)
          echo "kernelsu_version=$kernelsu_version" >> $GITHUB_ENV

      - name: Download Patch from 'SoDebug/KernelSU' (setup branch)
        run: |
          mkdir -p "$Setup_Dir"
          git clone -b setup https://github.com/SoDebug/KernelSU.git "$Setup_Dir"

      - name: Get Patch commit id
        run: |
          cd "$Setup_Dir"
          echo "patch_id=$(git show -s --format='%h')" >> $GITHUB_ENV

      - name: Prepare KernelSU patch archive
        run: |
          cp "$Setup_Dir/setup.sh" "$KernelSU_Dir/kernel/setup.sh"
          cd "$KernelSU_Dir"
          echo "${{ env.kernelsu_id }}" > kernelsu_id.txt
          echo "${{ env.kernelsu_version }}" > kernelsu_version.txt
          tar -czf "../KernelSU_${{ env.kernelsu_id }}_Patched_${{ env.patch_id }}.tar.gz" --exclude='.git' .
          mv "../KernelSU_${{ env.kernelsu_id }}_Patched_${{ env.patch_id }}.tar.gz" .

      - name: Upload KernelSU Patch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU_Patched
          path: ${{ env.KernelSU_Dir }}/KernelSU_${{ env.kernelsu_id }}_Patched_${{ env.patch_id }}.tar.gz
          retention-days: 5

      - name: Upload KernelSU Manager APK
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU_Manager
          path: ${{ env.Setup_Dir }}/*.apk
          retention-days: 5

  Collect_Config_Complie:
    needs: Patch_KernelSU
    runs-on: ubuntu-latest
    steps:
      - name: Collecting config
        run: echo "Debug=${{ secrets.Debug }}" >> $GITHUB_ENV
      - name: Setting Job (Debug mode)
        if: ${{ env.Debug == 'true' }}
        run: exit 1

  Collect_Config_Release:
    needs: Patch_KernelSU
    runs-on: ubuntu-latest
    steps:
      - name: Collecting config
        run: echo "ALLOW_RELEASE=${{ secrets.ALLOW_RELEASE }}" >> $GITHUB_ENV
      - name: Setting Job (Allow Release)
        if: ${{ env.ALLOW_RELEASE == 'false' }}
        run: exit 1

  Complie_SOVIET_ANDROID:
    needs: Collect_Config_Complie
    runs-on: ubuntu-latest
    env:
      CheckOut_DIR: /home/runner/work/kernel_xiaomi_raphael-ex/kernel_xiaomi_raphael
      AnyKernel: /home/runner/work/kernel_xiaomi_raphael-ex/AnyKernel
      test_patch: false
    steps:
      - name: Set current time
        run: echo "time=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      - name: Installing Dependencies
        if: ${{ env.test_patch != 'true' }}
        run: |
          sudo apt update -y
          sudo apt-get install -y zip flex bison libncurses-dev gawk libiberty-dev autoconf kmod bc build-essential gcc libc6 curl libstdc++6 git wget libssl-dev cpio p7zip-full ccache
          sudo apt clean

      - name: Clone Kernel Tree
        if: ${{ env.test_patch != 'true' }}
        run: |
          git clone -b 13.0_0516 https://github.com/SoDebug/kernel_xiaomi_raphael.git "$CheckOut_DIR"

      - name: Download KernelSU_Patched
        uses: actions/download-artifact@v4
        with:
          name: KernelSU_Patched
          path: ${{ env.CheckOut_DIR }}/KernelSU

      # ========== 使用官方 setup.sh 集成 KernelSU（自动打补丁） ==========
      - name: Integrate KernelSU via setup.sh
        run: |
          cd "${{ env.CheckOut_DIR }}/KernelSU"
          tar -xzf KernelSU_*_Patched_*.tar.gz
          echo "kernelsu_id=$(cat kernelsu_id.txt)" >> $GITHUB_ENV
          echo "kernelsu_version=$(cat kernelsu_version.txt)" >> $GITHUB_ENV
          rm KernelSU_*_Patched_*.tar.gz kernelsu_id.txt kernelsu_version.txt
          cd "${{ env.CheckOut_DIR }}"
          # 运行官方集成脚本（legacy 模式，适用于非 GKI 内核）
          sh KernelSU/kernel/setup.sh

      - name: Cloning Sources and Toolchain
        if: ${{ env.test_patch != 'true' }}
        run: |
          mkdir -p ~/clang
          wget -q https://github.com/Geeeeeker/boot/releases/download/clang-prebuilts-20260319-031015/clang-r450784d.tar.gz -O /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz -C ~/clang
          rm /tmp/clang.tar.gz

          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b android-10.0.0_r47 --depth=1 --single-branch --no-tags ~/aarch64-linux-android-4.9
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b android-10.0.0_r47 --depth=1 --single-branch --no-tags ~/arm-linux-androideabi-4.9
          git clone https://github.com/SoDebug/AnyKernel.git "${{ env.AnyKernel }}"

      # ========== 内核配置：启用 KernelSU，使用手动钩子模式（禁用 input hook） ==========
      - name: Configure Kernel (enable KSU manual hook)
        run: |
          cd "${{ env.CheckOut_DIR }}"
          # 生成基础配置
          make LLVM=1 LLVM_IAS=1 O=out raphael_defconfig
          # 强制启用 KernelSU 并选择手动钩子模式（避免 kprobe 依赖）
          ./scripts/config --file out/.config \
            --enable KSU \
            --enable KSU_MANUAL_HOOK \
            --disable KSU_INPUT_HOOK \
            --enable KALLSYMS \
            --enable KALLSYMS_ALL \
            --disable MODVERSIONS
          # 关闭可能冲突的 kprobe 选项
          ./scripts/config --file out/.config \
            --disable KPROBES \
            --disable KPROBE_EVENTS \
            --disable KSU_KPROBE_HOOKS
          make LLVM=1 LLVM_IAS=1 O=out olddefconfig
          # 验证关键配置
          grep -E "CONFIG_KSU|CONFIG_KSU_MANUAL_HOOK|CONFIG_KSU_INPUT_HOOK" out/.config || true

      - name: Compiling Kernel
        if: ${{ env.test_patch != 'true' }}
        run: |
          if [ -d ~/clang/clang-r450784d/bin ]; then
            CLANG=~/clang/clang-r450784d/bin
          else
            CLANG=~/clang/bin
          fi
          echo "Using CLANG: $CLANG"
          GCC32=~/arm-linux-androideabi-4.9/bin
          GCC64=~/aarch64-linux-android-4.9/bin
          PATH="$CLANG:$GCC64:$GCC32:$PATH"
          export PATH
          export ARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CC="ccache clang"
          export KCFLAGS="-Wno-vla-extension -Wno-error=unused-command-line-argument"

          cd "${{ env.CheckOut_DIR }}"
          make LLVM=1 LLVM_IAS=1 -j$(nproc) O=out

      - name: Packaging the Kernel
        if: ${{ env.test_patch != 'true' }}
        run: |
          cp -v ${{ env.CheckOut_DIR }}/out/arch/arm64/boot/Image.gz-dtb "${{ env.AnyKernel }}"/
          cp -v ${{ env.CheckOut_DIR }}/out/arch/arm64/boot/dtbo.img "${{ env.AnyKernel }}"/o
          cd "${{ env.AnyKernel }}"
          7z a -mx9 "Raphael-Kernel_KSU_${{ env.kernelsu_version }}_${{ env.kernelsu_id }}_SOVIET-ANDROID_13.zip" *

      - name: Upload output_files directory
        if: ${{ env.test_patch != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Raphael-Kernel_KSU_Dev_SOVIET-ANDROID_13
          path: ${{ env.AnyKernel }}/Raphael-Kernel_KSU_${{ env.kernelsu_version }}_${{ env.kernelsu_id }}_SOVIET-ANDROID_13.zip

  Release:
    needs:
      - Complie_SOVIET_ANDROID
      - Collect_Config_Release
    runs-on: ubuntu-latest
    env:
      Release_DIR: /home/runner/work/release
    steps:
      - name: Set current time
        run: echo "time=$(date +'%Y-%m-%d_%H-%M-%S')" >> "$GITHUB_OUTPUT"

      - name: Generate release tag and notes
        run: |
          echo "release_tag=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          cat > release.txt <<EOF
          SoDebug Kernel Config：
          Device Code: raphael
          Device Name：Redmi K20 Pro | Mi 9T Pro
          Support Android：13.0
          KernelSU Git Version：***
          KernelSU Version: *****
          Patch ID: *******
          KernelSU ID: *******
          Tested: undefined
          Build Date: $(date +'%Y/%m/%d')
          EOF

      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.Release_DIR }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v.${{ steps.tag.outputs.release_tag }}
          name: ${{ steps.tag.outputs.release_tag }} Kernel for Raphael
          body_path: release.txt
          files: |
            ${{ env.Release_DIR }}/KernelSU_Patched/*.tar.gz
            ${{ env.Release_DIR }}/KernelSU_Manager/*.apk
            ${{ env.Release_DIR }}/Raphael-Kernel_KSU_Dev_SOVIET-ANDROID_13/*.zip
