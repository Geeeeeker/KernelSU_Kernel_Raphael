name: Kernel CI

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  Patch_KernelSU:
    runs-on: ubuntu-latest
    env:
      KernelSU_Dir: /home/runner/work/KernelSU
      Setup_Dir: /home/runner/work/Setup_Dir
    steps:
      - name: Download KernelSU from 'SoDebug/KernelSU'
        run: |
          mkdir -p "$KernelSU_Dir"
          git clone https://github.com/SoDebug/KernelSU.git "$KernelSU_Dir"
      - name: Get KernelSU version and id
        run: |
          cd "$KernelSU_Dir"
          echo "kernelsu_id=$(git show -s --format='%h')" >> $GITHUB_ENV
          git_count=$(git rev-list --count HEAD)
          kernelsu_version=$(expr 10000 + $git_count + 200)
          echo "kernelsu_version=$kernelsu_version" >> $GITHUB_ENV
      - name: Download Patch from 'SoDebug/KernelSU' (setup branch)
        run: |
          mkdir -p "$Setup_Dir"
          git clone -b setup https://github.com/SoDebug/KernelSU.git "$Setup_Dir"
      - name: Get Patch commit id
        run: |
          cd "$Setup_Dir"
          echo "patch_id=$(git show -s --format='%h')" >> $GITHUB_ENV
      - name: Prepare KernelSU patch archive
        run: |
          cp "$Setup_Dir/setup.sh" "$KernelSU_Dir/kernel/setup.sh"
          cd "$KernelSU_Dir"
          echo "${{ env.kernelsu_id }}" > kernelsu_id.txt
          echo "${{ env.kernelsu_version }}" > kernelsu_version.txt
          tar -czf "../KernelSU_${{ env.kernelsu_id }}_Patched_${{ env.patch_id }}.tar.gz" --exclude='.git' .
          mv "../KernelSU_${{ env.kernelsu_id }}_Patched_${{ env.patch_id }}.tar.gz" .
      - name: Upload KernelSU Patch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU_Patched
          path: ${{ env.KernelSU_Dir }}/KernelSU_${{ env.kernelsu_id }}_Patched_${{ env.patch_id }}.tar.gz
          retention-days: 5

      - name: Upload KernelSU Manager APK
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU_Manager
          path: ${{ env.Setup_Dir }}/*.apk
          retention-days: 5

  Collect_Config_Complie:
    needs: Patch_KernelSU
    runs-on: ubuntu-latest
    steps:
      - name: Collecting config
        run: echo "Debug=${{ secrets.Debug }}" >> $GITHUB_ENV
      - name: Setting Job (Debug mode)
        if: ${{ env.Debug == 'true' }}
        run: exit 1

  Collect_Config_Release:
    needs: Patch_KernelSU
    runs-on: ubuntu-latest
    steps:
      - name: Collecting config
        run: echo "ALLOW_RELEASE=${{ secrets.ALLOW_RELEASE }}" >> $GITHUB_ENV
      - name: Setting Job (Allow Release)
        if: ${{ env.ALLOW_RELEASE == 'false' }}
        run: exit 1

  Compile_SOVIET_ANDROID:
    needs: Collect_Config_Complie
    runs-on: ubuntu-latest
    env:
      CheckOut_DIR: /home/runner/work/kernel_xiaomi_raphael
      AnyKernel: /home/runner/work/AnyKernel
      test_patch: false
    steps:
      - name: Set build timestamp
        run: echo "time=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      - name: Install Dependencies
        if: ${{ env.test_patch != 'true' }}
        run: |
          sudo apt update -y
          sudo apt-get install -y zip flex bison libncurses-dev gawk libiberty-dev autoconf kmod bc build-essential gcc libc6 curl libstdc++6 git wget libssl-dev cpio p7zip-full ccache automake libtool pkg-config libudev-dev
          sudo apt clean
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          create-symlink: true
          key: kernel-usbip-build
          restore-keys: |
            kernel-usbip-build
          max-size: '10G'

      - name: Clone Kernel Source (Android 16.0)
        if: ${{ env.test_patch != 'true' }}
        run: |
          git clone -b 16.0 https://github.com/Geeeeeker/kernel_xiaomi_raphael-pixel.git "$CheckOut_DIR"
      - name: Download KernelSU_Patched Artifact
        uses: actions/download-artifact@v4
        with:
          name: KernelSU_Patched
          path: ${{ env.CheckOut_DIR }}/KernelSU

      - name: Integrate KernelSU into Kernel Source (Manual method)
        run: |
          cd "${{ env.CheckOut_DIR }}/KernelSU"
          tar -xzf KernelSU_*_Patched_*.tar.gz
          echo "kernelsu_id=$(cat kernelsu_id.txt)" >> $GITHUB_ENV
          echo "kernelsu_version=$(cat kernelsu_version.txt)" >> $GITHUB_ENV
          rm KernelSU_*_Patched_*.tar.gz kernelsu_id.txt kernelsu_version.txt
          
          cd "${{ env.CheckOut_DIR }}"
          rm -rf drivers/staging/kernelsu
          mkdir -p drivers/staging/kernelsu
          ln -sf ../../../KernelSU/kernel drivers/staging/kernelsu/KernelSU
          cp KernelSU/kernel/Makefile drivers/staging/kernelsu/Makefile
          cp KernelSU/kernel/Kconfig drivers/staging/kernelsu/Kconfig
          if ! grep -q "source \"drivers/staging/kernelsu/Kconfig\"" drivers/Kconfig; then
            echo 'source "drivers/staging/kernelsu/Kconfig"' >> drivers/Kconfig
          fi
          echo "KernelSU integration check:"
          ls -la drivers/staging/kernelsu/
      - name: Integrate rtl8188eus WiFi driver source
        if: ${{ env.test_patch != 'true' }}
        run: |
          cd "${{ env.CheckOut_DIR }}"
          git clone --depth=1 --branch master https://github.com/Geeeeeker/android_kernel_xiaomi_sdm845.git rtl8188eus-repo
          if [ -d "rtl8188eus-repo/drivers/rtl8188eus" ]; then
            cp -r rtl8188eus-repo/drivers/rtl8188eus drivers/
            if ! grep -q "obj-\$(CONFIG_RTL8188EU)" drivers/Makefile; then
              echo 'obj-$(CONFIG_RTL8188EU) += rtl8188eus/' >> drivers/Makefile
            fi
            if ! grep -q "source \"drivers/rtl8188eus/Kconfig\"" drivers/Kconfig; then
              echo 'source "drivers/rtl8188eus/Kconfig"' >> drivers/Kconfig
            fi
          else
            echo "Error: rtl8188eus directory not found in cloned repo"
            exit 1
          fi
          rm -rf rtl8188eus-repo
          echo "rtl8188eus driver source integrated."
      - name: Prepare Toolchains
        if: ${{ env.test_patch != 'true' }}
        run: |
          mkdir -p ~/clang
          wget -q https://github.com/Geeeeeker/boot/releases/download/clang-prebuilts-20260319-031015/clang-r547379.tar.gz -O /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz -C ~/clang
          rm /tmp/clang.tar.gz
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b android-10.0.0_r47 --depth=1 --single-branch --no-tags ~/aarch64-linux-android-4.9
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b android-10.0.0_r47 --depth=1 --single-branch --no-tags ~/arm-linux-androideabi-4.9
          git clone https://github.com/SoDebug/AnyKernel.git "${{ env.AnyKernel }}"
      # ---------- 新增：配置与 Docker 集成 ----------
      - name: Apply Kernel Config and Docker Support
        if: ${{ env.test_patch != 'true' }}
        run: |
          cd "${{ env.CheckOut_DIR }}"
          DEFCONFIG="arch/arm64/configs/raphael_defconfig"
          # 追加全部所需配置项
          echo "CONFIG_MODULES=y" >> $DEFCONFIG
          echo "CONFIG_KPROBES=y" >> $DEFCONFIG
          echo "CONFIG_HAVE_KPROBES=y" >> $DEFCONFIG
          echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG
          echo "CONFIG_OVERLAY_FS=y" >> $DEFCONFIG
          sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/' $DEFCONFIG
          sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_CLANG=n/' $DEFCONFIG
          sed -i 's/CONFIG_THINLTO=y/CONFIG_THINLTO=n/' $DEFCONFIG
          echo "CONFIG_LTO_NONE=y" >> $DEFCONFIG
          echo "CONFIG_CC_WERROR=n" >> $DEFCONFIG
          echo "CONFIG_BPF_JIT=y" >> $DEFCONFIG
          echo "# CONFIG_BPF_JIT_ALWAYS_ON is not set" >> $DEFCONFIG
          echo "CONFIG_BPF_SYSCALL=y" >> $DEFCONFIG
          echo "CONFIG_SYSVIPC=y" >> $DEFCONFIG
          echo "CONFIG_SYSVIPC_SYSCTL=y" >> $DEFCONFIG
          echo "CONFIG_SYSVIPC_COMPAT=y" >> $DEFCONFIG
          echo "CONFIG_EPOLL=y" >> $DEFCONFIG
          echo "CONFIG_EVENTFD=y" >> $DEFCONFIG
          echo "CONFIG_SIGNALFD=y" >> $DEFCONFIG
          echo "CONFIG_INOTIFY_USER=y" >> $DEFCONFIG
          echo "CONFIG_SHMEM=y" >> $DEFCONFIG
          echo "CONFIG_TMPFS=y" >> $DEFCONFIG
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> $DEFCONFIG
          echo "CONFIG_TMPFS_XATTR=y" >> $DEFCONFIG
          # USB/IP (内建)
          echo "CONFIG_USBIP_CORE=y" >> $DEFCONFIG
          echo "CONFIG_USBIP_VHCI_HCD=y" >> $DEFCONFIG
          echo "CONFIG_USBIP_HOST=y" >> $DEFCONFIG
          # 允许 section mismatch 警告而不中止编译
          echo "CONFIG_SECTION_MISMATCH_WARN_ONLY=y" >> $DEFCONFIG
          # Backlight 支持
          echo "CONFIG_BACKLIGHT_CLASS_DEVICE=y" >> $DEFCONFIG
          echo "CONFIG_BACKLIGHT_QCOM=y" >> $DEFCONFIG
          # 禁用模块版本控制
          echo "CONFIG_MODVERSIONS=n" >> $DEFCONFIG
          # ZRAM / ZSTD
          echo "CONFIG_ZRAM=y" >> $DEFCONFIG
          echo "CONFIG_ZRAM_DEF_COMP_ZSTD=y" >> $DEFCONFIG
          echo "CONFIG_CRYPTO_ZSTD=y" >> $DEFCONFIG
          # KernelSU
          echo "CONFIG_KSU=y" >> $DEFCONFIG
          echo "CONFIG_KALLSYMS=y" >> $DEFCONFIG
          echo "CONFIG_KALLSYMS_ALL=y" >> $DEFCONFIG
          # rtl8188eus (内建)
          echo "CONFIG_RTL8188EU=y" >> $DEFCONFIG
          # USB Serial
          echo "CONFIG_USB_SERIAL=y" >> $DEFCONFIG
          echo "CONFIG_USB_SERIAL_CONSOLE=y" >> $DEFCONFIG
          echo "CONFIG_USB_SERIAL_GENERIC=y" >> $DEFCONFIG
          echo "CONFIG_USB_SERIAL_CH341=y" >> $DEFCONFIG
          echo "CONFIG_USB_SERIAL_FTDI_SIO=y" >> $DEFCONFIG
          echo "CONFIG_USB_SERIAL_CP210X=y" >> $DEFCONFIG
          echo "CONFIG_USB_SERIAL_PL2303=y" >> $DEFCONFIG
          # 移除原有 utils 目录并克隆 Docker 支持仓库
          rm -rf utils
          git clone https://github.com/tomxi1997/lxc-docker-support-for-android.git utils
          # 移除强制选中项
          sed -i '/select CFS_BANDWIDTH/d' utils/Kconfig
          sed -i '/select DOCKER_STATISTICS/d' utils/Kconfig
          sed -i '/select BLK_DEV_THROTTLING/d' utils/Kconfig
          sed -i '/select CFQ_GROUP_IOSCHED/d' utils/Kconfig
          # 将 utils 的 Kconfig 加入顶层 Kconfig
          if ! grep -q 'source "utils/Kconfig"' Kconfig; then
            echo 'source "utils/Kconfig"' >> Kconfig
          fi
          echo "CONFIG_DOCKER=y" >> $DEFCONFIG
          # 禁用冲突特性
          echo "# CONFIG_CFS_BANDWIDTH is not set" >> $DEFCONFIG
          echo "# CONFIG_DOCKER_STATISTICS is not set" >> $DEFCONFIG
          sed -i '/CONFIG_ANDROID_PARANOID_NETWORK/d' $DEFCONFIG
          echo "# CONFIG_ANDROID_PARANOID_NETWORK is not set" >> $DEFCONFIG
          echo "# CONFIG_BLK_DEV_THROTTLING is not set" >> $DEFCONFIG
          echo "# CONFIG_CFQ_GROUP_IOSCHED is not set" >> $DEFCONFIG
          # 修复设备树错误
          sed -i '/sdm845-v2-qvr-evt.dtb/d' arch/arm64/boot/dts/qcom/Makefile
          sed -i '/qvr/d' arch/arm64/boot/dts/qcom/Makefile
          sed -i '/interposer/d' arch/arm64/boot/dts/qcom/Makefile
          # 应用 runc/qtaguid 补丁
          chmod +x utils/runcpatch.sh
          if [ -f kernel/cgroup/cgroup.c ]; then
              sh utils/runcpatch.sh kernel/cgroup/cgroup.c
          fi
          if [ -f kernel/cgroup.c ]; then
              sh utils/runcpatch.sh kernel/cgroup.c
          fi
          if [ -f net/netfilter/xt_qtaguid.c ]; then
              patch -p0 < utils/xt_qtaguid.patch
          fi
      - name: Fix btrfs timespec64 type mismatch
        if: ${{ env.test_patch != 'true' }}
        run: |
          cd "${{ env.CheckOut_DIR }}"
          sed -i 's/struct timespec now = current_time(&parent_inode->vfs_inode);/struct timespec64 now = current_time(\&parent_inode->vfs_inode);/' fs/btrfs/inode.c
          sed -i 's/struct timespec now = current_time(inode);/struct timespec64 now = current_time(inode);/' fs/btrfs/file.c
          echo "btrfs/inode.c and file.c patched for timespec64"  
      # ---------- 修复 btrfs 类型错误（第 78 行附近）----------
      - name: Fix btrfs timespec64 type mismatch
        if: ${{ env.test_patch != 'true' }}
        run: |
          cd "${{ env.CheckOut_DIR }}"
          sed -i 's/struct timespec now = current_time(&parent_inode->vfs_inode);/struct timespec64 now = current_time(\&parent_inode->vfs_inode);/' fs/btrfs/inode.c
          echo "btrfs/inode.c patched for timespec64"

      - name: Compile Kernel
        if: ${{ env.test_patch != 'true' }}
        run: |
          if [ -d ~/clang/clang-r547379/bin ]; then
            CLANG=~/clang/clang-r547379/bin
          else
            CLANG=~/clang/bin
          fi
          echo "Using CLANG: $CLANG"
          GCC32=~/arm-linux-androideabi-4.9/bin
          GCC64=~/aarch64-linux-android-4.9/bin
          export PATH="$CLANG:$GCC64:$GCC32:$PATH"
          export ARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CC="ccache clang"
          export KCFLAGS="-Wno-vla-extension -Wno-error=unused-command-line-argument"
          cd "${{ env.CheckOut_DIR }}"
          make LLVM=1 LLVM_IAS=1 O=out raphael_defconfig
          # 由于我们已经在 defconfig 中写入了所有配置，直接 olddefconfig 即可
          make LLVM=1 LLVM_IAS=1 O=out olddefconfig
          make LLVM=1 LLVM_IAS=1 O=out -j$(nproc)

      - name: Package Kernel
        if: ${{ env.test_patch != 'true' }}
        run: |
          cp -v ${{ env.CheckOut_DIR }}/out/arch/arm64/boot/Image.gz-dtb "${{ env.AnyKernel }}"/
          cp -v ${{ env.CheckOut_DIR }}/out/arch/arm64/boot/dtbo.img "${{ env.AnyKernel }}"/o
          cd "${{ env.AnyKernel }}"
          7z a -mx9 "Raphael-Kernel_KSU_${{ env.kernelsu_version }}_${{ env.kernelsu_id }}_SOVIET-ANDROID_16.zip" *
      
      - name: Upload Kernel Package
        if: ${{ env.test_patch != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Raphael-Kernel_KSU_Dev_SOVIET-ANDROID_16
          path: ${{ env.AnyKernel }}/Raphael-Kernel_KSU_${{ env.kernelsu_version }}_${{ env.kernelsu_id }}_SOVIET-ANDROID_16.zip
